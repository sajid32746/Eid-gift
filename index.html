<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ঈদ মোবারক ❤️</title>

<style>
/* সাধারণ স্টাইল - মোবাইল ফ্রেন্ডলি */
body {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
  color: white;
  text-align: center;
  background: linear-gradient(45deg, #0f0c29, #302b63, #7209b7);
  background-size: 400% 400%;
  animation: bg 12s infinite;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

@keyframes bg {
  0% { background-position: 0% 50% }
  50% { background-position: 100% 50% }
  100% { background-position: 0% 50% }
}

/* পেজ লেআউট */
.page {
  display: none;
  min-height: 100vh;
  width: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 40px 20px;
  box-sizing: border-box;
}
.active { display: flex; }

/* টেক্সট ও টাইপিং ইফেক্ট */
h1, h2, p {
  text-shadow: 0 0 10px rgba(255, 77, 109, 0.6);
  line-height: 1.6;
  margin: 15px 0;
}
h2 { font-size: 20px; width: 90%; }
.typing { border-right: 2px solid white; animation: blink .7s infinite; }
@keyframes blink { 50% { border-color: transparent; } }

/* বাটন ও ইনপুট */
button {
  padding: 12px 30px;
  margin: 15px 0;
  border: none;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  z-index: 10;
}
input {
  padding: 12px;
  border-radius: 10px;
  border: 2px solid #ff4d6d;
  width: 80%;
  max-width: 250px;
  text-align: center;
  outline: none;
  color: #333;
  font-size: 16px;
}

/* চাঁদ ও অন্যান্য এলিমেন্ট */
.moon { font-size: 50px; margin-top: 20px; animation: beat 1s infinite; }
@keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

#musicBtn { position: fixed; top: 15px; right: 15px; z-index: 1000; padding: 8px 15px; font-size: 14px; margin: 0; }
.fire { position: absolute; animation: fire 1s forwards; font-size: 25px; pointer-events: none; }
@keyframes fire { to { transform: translateY(-300px); opacity: 0; } }

.heart-float { position: absolute; bottom: -50px; animation: float 6s linear infinite; pointer-events: none; }
@keyframes float { 0% { transform: translateY(0) rotate(0deg); opacity: 0.8; } 100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
</style>
</head>

<body>

<div class="moon">🌙</div>

<button id="musicBtn" onclick="musicToggle()">🎵 Music: Off</button>

<audio id="music" loop preload="auto">
  <source src="https://www.bensound.com/bensound-music/bensound-memories.mp3" type="audio/mpeg">
</audio>

<div class="page active" id="p1">
  <h1>Welcome Dear Pakhi 💖</h1>
  <button onclick="startApp()">Start</button>
</div>

<div class="page" id="p2">
  <h2>তোমার নাম লিখুন</h2>
  <input id="name" type="text" placeholder="এখানে নাম লিখুন...">
  <button onclick="goName()">Next</button>
</div>

<div class="page" id="p3">
  <h2 id="m1"></h2>
  <button id="nextBtn3" style="display:none;" onclick="go(3)">Next</button>
</div>

<div class="page" id="p4">
  <h2 id="m2"></h2>
  <p id="final-msg"></p>
</div>

<script>
let music = document.getElementById("music");
let isPlaying = false;

// প্রথম ক্লিকেই মিউজিক শুরু করার জন্য
function startApp() {
    music.play().then(() => {
        isPlaying = true;
        document.getElementById("musicBtn").innerHTML = "⏸ Music: On";
    }).catch(e => console.log("Music auto-play blocked, wait for user interaction."));
    go(1);
}

function musicToggle() {
    if (!isPlaying) { 
        music.play(); 
        isPlaying = true; 
        document.getElementById("musicBtn").innerHTML = "⏸ Music: On"; 
    } else { 
        music.pause(); 
        isPlaying = false; 
        document.getElementById("musicBtn").innerHTML = "🎵 Music: Off"; 
    }
}

function go(n) {
    document.getElementById("p" + n).classList.remove("active");
    document.getElementById("p" + (n + 1)).classList.add("active");
    window.scrollTo(0, 0); // পেজ চেঞ্জ হলে একদম উপরে নিয়ে যাবে
    if (n + 1 == 4) { firework(); floatingHearts(); finalMessage(); }
}

// টাইপিং ইফেক্ট (HTML ট্যাগ হ্যান্ডেল করবে এবং অটো স্ক্রল করবে)
function typeText(el, text, callback) {
    let i = 0;
    el.innerHTML = "";
    el.classList.add("typing");
    function typing() {
        if (i < text.length) {
            if (text.charAt(i) === '<') {
                let tagEnd = text.indexOf('>', i);
                if (tagEnd !== -1) { 
                    el.innerHTML += text.substring(i, tagEnd + 1); 
                    i = tagEnd + 1; 
                }
            } else { 
                el.innerHTML += text.charAt(i); 
                i++; 
            }
            // কন্টেন্ট বড় হলে নিজে থেকে নিচে নামবে (Mobile Friendly)
            window.scrollTo(0, document.body.scrollHeight);
            setTimeout(typing, 40);
        } else {
            el.classList.remove("typing");
            if (callback) callback();
        }
    }
    typing();
}

function goName() {
    let userName = document.getElementById("name").value;
    if (userName.trim() == "") { alert("দয়া করে নাম লিখুন!"); return; }

    let message = `💖 ${userName}, তুমি আমার জীবনের অনেক দামি একজন মানুষ 😊💝<br><br>
    আমার জীবনের প্রতিটি মুহুর্ত তোমার উপস্থিতিতে আরও সুন্দর হয়ে ওঠে।🫠🫶<br><br>
    ঈদের এই আনন্দময় দিনে একটাই চাওয়া—তুমি যেখানেই থাকো, সুস্থ থেকো আর সব সময় হাসিখুশি থাকো।❤️‍🩹🥹<br><br>
    ঈদের দিনের আনন্দ তোমার জীবনকে সারাবছর হাসিখুশি রাখুক। 🥰💫`;

    go(2);
    typeText(document.getElementById("m1"), message, () => {
        document.getElementById("nextBtn3").style.display = "inline-block";
        window.scrollTo(0, document.body.scrollHeight);
    });
    document.getElementById("m2").innerHTML = `🌙 ঈদ মোবারক ${userName} 💖`;
}

function finalMessage() {
    let finalTxt = `অনেক অনেক ভালোবাসা তোমার জন্য পাখি 😊💝<br><br>
    কোনো ভুল করলে বা আমার কোনো কথায় কষ্ট পেয়ে থাকলে মাফ করে দিও 💖<br><br>
    কষ্ট করে এতো দূর আসার জন্য ধন্যবাদ ❤️`;
    typeText(document.getElementById("final-msg"), finalTxt, () => {
        document.getElementById("final-msg").innerHTML += `<br><br><span style="font-size:24px; color:#ff4d6d;">🎉 End 🎉</span>`;
        window.scrollTo(0, document.body.scrollHeight);
    });
}

function firework() {
    setInterval(() => {
        let f = document.createElement("div");
        f.className = "fire"; f.innerHTML = "🎆";
        f.style.left = Math.random() * 90 + "vw";
        f.style.top = "80vh";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 1000);
    }, 400);
}

function floatingHearts() {
    setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart-float"; h.innerHTML = "💖";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (15 + Math.random() * 20) + "px";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }, 500);
}
</script>

</body>
</html>
