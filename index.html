<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Tanjila 💖</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  font-family: 'Comic Sans MS', cursive;
  overflow:hidden;
}

.container {
  text-align:center;
  color:white;
}

/* glowing name */
h1 {
  font-size:32px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #fff; }
  to { text-shadow: 0 0 20px #ff4d6d, 0 0 30px #ff4d6d; }
}

/* cat */
.cat {
  width:100px;
  height:100px;
  background:white;
  border-radius:50%;
  position:relative;
  margin:auto;
  cursor:pointer;
}

.jump {
  animation: jump 0.5s;
}

@keyframes jump {
  0% { transform:translateY(0); }
  50% { transform:translateY(-30px); }
  100% { transform:translateY(0); }
}

.ear {
  width:30px;
  height:30px;
  background:white;
  position:absolute;
  top:-10px;
  border-radius:50%;
}

.ear.left { left:10px; }
.ear.right { right:10px; }

.eye {
  width:15px;
  height:15px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:35px;
  animation: blink 3s infinite;
}

.eye.left { left:25px; }
.eye.right { right:25px; }

@keyframes blink {
  0%, 90%, 100% { height:15px; }
  95% { height:2px; }
}

.mouth {
  width:20px;
  height:10px;
  border-bottom:3px solid black;
  border-radius:50%;
  position:absolute;
  bottom:25px;
  left:40px;
}

/* speech bubble */
.bubble {
  position:absolute;
  top:-60px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  color:#333;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  display:none;
}

/* text */
p {
  font-size:22px;
  min-height:50px;
}

button {
  display:none;
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
}

/* heart rain */
.heart {
  position:absolute;
  color:white;
  animation: float 4s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-600px); opacity:0; }
}

/* popup */
.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:#333;
  padding:20px;
  border-radius:15px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="cat" onclick="catClick()" id="cat">
    <div class="bubble" id="bubble">I care about you 💖</div>
    <div class="ear left"></div>
    <div class="ear right"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>

  <h1>Tanjila 💖</h1>
  <p id="text"></p>
  <button id="btn" onclick="showPopup()">Click Me 💌</button>

</div>

<div class="popup" id="popup">
  <p>তুমি আমার কাছে সত্যিই অনেক important 💖🙂</p>
</div>

<!-- cute music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-cute.mp3" type="audio/mp3">
</audio>

<script>
const messages = [
"তুমি মন খারাপ করো না... 😔",
"সব ঠিক হয়ে যাবে 🌈",
"তুমি অনেক special 💖",
"তোমার হাসিটা সবচেয়ে সুন্দর 😄",
"আমি সবসময় তোমার পাশে আছি 🤍",
"একটু হাসো তো... 😊",
"END 💖"
];

let msgIndex = 0;
let charIndex = 0;

function typeEffect() {
  if(msgIndex < messages.length){
    if(charIndex < messages[msgIndex].length){
      document.getElementById("text").innerHTML += messages[msgIndex].charAt(charIndex);
      charIndex++;
      setTimeout(typeEffect, 50);
    } else {
      setTimeout(() => {
        document.getElementById("text").innerHTML = "";
        charIndex = 0;
        msgIndex++;
        typeEffect();
      }, 1500);
    }
  } else {
    document.getElementById("btn").style.display = "inline-block";
  }
}

typeEffect();

/* cat click */
function catClick(){
  let cat = document.getElementById("cat");
  let bubble = document.getElementById("bubble");

  cat.classList.add("jump");
  bubble.style.display = "block";

  setTimeout(() => {
    cat.classList.remove("jump");
    bubble.style.display = "none";
  },1000);
}

/* popup */
function showPopup(){
  document.getElementById("popup").style.display = "block";
}

/* heart rain */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💗";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  },4000);
},250);
</script>

</body>
</html>
